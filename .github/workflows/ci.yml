name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Python: lint, type-check, test
  # ──────────────────────────────────────────────
  engine:
    name: Engine (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check engine/

      - name: Type-check (mypy)
        run: uv run mypy engine/ --ignore-missing-imports

      - name: Test (pytest)
        run: uv run pytest --tb=short -q

  # ──────────────────────────────────────────────
  # Frontend: lint, type-check, test, build
  # ──────────────────────────────────────────────
  ui:
    name: UI (Node/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc -b

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # Secret scanning
  # ──────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
