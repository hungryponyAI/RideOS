repos:
  # Python: ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^engine/
      - id: ruff-format
        files: ^engine/

  # Python: mypy
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd engine && uv run mypy engine/ --ignore-missing-imports'
        language: system
        types: [python]
        files: ^engine/
        pass_filenames: false

  # General: trailing whitespace, end-of-file, large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks
